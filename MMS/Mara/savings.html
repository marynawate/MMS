<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deposit Savings</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    // Simple JavaScript validation for deposit form
    function validateDepositForm() {
      let amount = document.getElementById("depositAmount").value.trim();
      let errorMessage = document.getElementById("depositError");
      
      // Clear previous error message
      errorMessage.textContent = "";
      
      // Check if the deposit amount is provided and is a positive number
      if (amount === "") {
        errorMessage.textContent = "Deposit amount is required.";
        return false;
      }
      
      if (isNaN(amount) || Number(amount) <= 0) {
        errorMessage.textContent = "Please enter a valid deposit amount.";
        return false;
      }
      
      return true;
    }
  </script>
  <style>
    /* Basic styling for deposit form */
    .form-container {
      max-width: 400px;
      margin: 30px auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .form-container label {
      font-weight: bold;
    }
    .form-container input[type="number"] {
      width: 100%;
      padding: 8px;
      margin: 5px 0 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .form-container button {
      width: 100%;
      padding: 10px;
      background-color: #2475f3;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .form-container button:hover {
      background-color: #1b5dc2;
    }
    .error {
      color: red;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <header>
    <h1>Deposit Savings </h1>
    <nav>
      <a href="dashboard.php">Dashboard</a>
      <a href="logout.php">Logout</a>
    </nav>
  </header>

  <div class="form-container">
    <form id="depositForm" action="deposit.php" method="post" onsubmit="return validateDepositForm();">
      <label for="depositAmount">Deposit Amount (KES):</label>
      <input type="number" id="depositAmount" name="deposit_amount" placeholder="Enter deposit amount" required>
      <p id="depositError" class="error"></p>
      
      <button type="submit">Submit Deposit</button>
    </form>
  </div>
  
  <footer>
    <p>&copy; 2024 MMS System</p>
  </footer>
</body>
</html>
